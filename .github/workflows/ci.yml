name: ci

on:
  push:
    branches: [clmain, main]
  pull_request:

jobs:
  tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node packages/tokens/build.mjs

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node build.mjs
        working-directory: packages/tokens
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      # npm audit is advisory until M6 hardening makes it a gate
      - run: npm audit --omit=dev || true

  gateway:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/gateway } }
    steps:
      - uses: actions/checkout@v4
      # Fiber v3.4 requires Go >= 1.25; version comes from go.mod
      - uses: actions/setup-go@v5
        with: { go-version-file: services/gateway/go.mod, cache-dependency-path: services/gateway/go.sum }
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... 2>/dev/null || true

  brain:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/brain } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]" pip-audit
      - run: python -m compileall app
      - run: python -c "from app.main import app; print('brain imports ok')"
      - run: python -m pytest tests -q
      # advisory until M6
      - run: pip-audit || true

  core:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/core } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: services/core }
      # tonic-build (build.rs) generates Rust stubs from packages/proto
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check --all-targets
      - run: cargo install cargo-audit --locked && cargo audit || true

  cross-tenant:
    # Wrong-user isolation corpus: auth fails closed, tenant ctx from
    # metadata only, vault AAD-bound per user. Grows the live HTTP corpus
    # from M3+.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: services/gateway/go.mod, cache-dependency-path: services/gateway/go.sum }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e "services/brain[dev]"
      - run: bash infra/ci/cross_tenant_test.sh
