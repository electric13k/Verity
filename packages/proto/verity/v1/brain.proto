syntax = "proto3";

package verity.v1;

import "verity/v1/common.proto";

option go_package = "github.com/electric13k/verity/packages/proto/gen/go/verity/v1;verityv1";

// Brain: Python orchestration service (chat, flows, offices, memory, providers).
// Called by the gateway only. Tenant identity comes from gRPC metadata.
service BrainService {
  rpc Health(HealthRequest) returns (HealthResponse);

  // M1 hello-path: gateway → brain round trip proving the spine.
  rpc Hello(HelloRequest) returns (HelloResponse);

  // Chat streaming (M3). One request, server-streamed chunks; the gateway
  // fans out to the client as SSE. The first chunk is a ChatMeta carrying the
  // (possibly new) conversation id, the assistant message id, and an
  // auto-generated title for brand-new conversations.
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);

  // Regenerate an assistant message: drops the old assistant turn and streams
  // a fresh one against the same preceding user message + history.
  rpc RegenerateMessage(RegenerateRequest) returns (stream ChatChunk);

  // Edit a user message: rewrites its content, truncates every later message
  // in the conversation, then streams a fresh assistant reply.
  rpc EditMessage(EditMessageRequest) returns (stream ChatChunk);

  // Flow execution (M5): conductor/workers/inspector roles over a task,
  // streamed phase by phase. Blind Orchestration Protocol applies: events
  // crossing this boundary carry task substance, never machinery.
  rpc RunFlow(FlowRequest) returns (stream FlowEvent);
}

message HelloRequest {
  string message = 1;
}

message HelloResponse {
  string message = 1;
  // Set when brain successfully round-trips through core (M1 full spine).
  string core_echo = 2;
}

message ChatRequest {
  string conversation_id = 1;
  string user_message = 2;
  string model = 3;          // provider:model selector; empty = default
  bool use_memory = 4;       // consult brains (cognee) before answering
  repeated string file_ids = 5;  // uploaded files to fold into context (P6)
}

message RegenerateRequest {
  string message_id = 1;     // the assistant message to regenerate
  string model = 2;
  bool use_memory = 3;
}

message EditMessageRequest {
  string message_id = 1;     // the user message to edit
  string content = 2;        // new content; truncates every later message
  string model = 3;
  bool use_memory = 4;
}

message ChatChunk {
  oneof payload {
    string delta = 1;            // text delta
    ChatUsage usage = 2;         // terminal chunk
    ChatConfidence confidence = 3;
    ChatMeta meta = 4;           // FIRST chunk: conversation id + message id + title
  }
}

// Emitted first so a new conversation surfaces its id/auto-name to the client.
message ChatMeta {
  string conversation_id = 1;
  string message_id = 2;   // the assistant message id being streamed
  string title = 3;        // set when a title was (auto-)generated this turn
}

message ChatUsage {
  uint32 input_tokens = 1;
  uint32 output_tokens = 2;
}

message ChatConfidence {
  uint32 score = 1;  // 0-100, RRR protocol
  string rationale = 2;
}

message FlowRequest {
  string task = 1;
  string flow_kind = 2;  // "converge" | "diverge_converge"; empty = auto-pick
  string model = 3;      // provider:model selector; empty = default
  uint32 workers = 4;    // parallel workers; 0 = default (2), capped server-side
}

message FlowEvent {
  string role = 1;     // conductor | worker-<n> | inspector | flow
  string phase = 2;    // plan | work | verify | converge | done | error
  string content = 3;  // sanitized (BOP) before leaving the brain
}
